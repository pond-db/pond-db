name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e '.[dev]'
          pip install -e src/sdk/

      - name: Collect and split tests (shard ${{ matrix.shard }}/4)
        id: split
        run: |
          # Collect all test files, excluding browser tests
          ALL_FILES=$(find tests/ -name 'test_*.py' ! -name 'test_browser.py' | sort)
          TOTAL=$(echo "$ALL_FILES" | wc -l)
          SHARD=${{ matrix.shard }}
          PER_SHARD=$(( (TOTAL + 3) / 4 ))
          START=$(( (SHARD - 1) * PER_SHARD + 1 ))
          FILES=$(echo "$ALL_FILES" | sed -n "${START},$(( START + PER_SHARD - 1 ))p" | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Running shard $SHARD: $(echo "$FILES" | wc -w) test files"

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: pytest ${{ steps.split.outputs.files }} --cov=src/ponddb --cov-report=term-missing -v --tb=short

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build --wheel
