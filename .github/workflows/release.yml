name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/databasecompany/ponddb:${{ steps.version.outputs.VERSION }}
            ghcr.io/databasecompany/ponddb:latest

  release-notes:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "PondDB v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/databasecompany/ponddb:${{ steps.version.outputs.VERSION }}
            ```

            ## Quick Start

            ```bash
            cp .env.example .env
            # Edit .env — set POND_API_KEY and POND_JWT_SECRET
            docker compose up
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
