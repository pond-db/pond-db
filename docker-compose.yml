services:
  ponddb:
    build: .
    container_name: ponddb
    ports:
      - "8432:8432"
    environment:
      - POND_HOST=0.0.0.0
      - POND_PORT=8432
      - POND_SQLITE_PATH=/app/data/ponddb.db
      - POND_DATA_ROOT=/app/data
      - POND_LOG_LEVEL=warning
    volumes:
      - pond-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8432/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pond-data:
