worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone: 10MB zone, 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Body size limit (applies globally, can be overridden per server/location)
    client_max_body_size 10m;

    sendfile on;
    keepalive_timeout 65;

    # Public server block — port 80
    server {
        listen 80;
        server_name _;

        # Apply rate limiting to all public requests
        limit_req zone=api_limit burst=20 nodelay;

        # Block /admin/* from public access
        location /admin {
            return 403;
        }

        # Block /metrics from public access
        location /metrics {
            return 403;
        }

        # Proxy all other traffic to ponddb
        location / {
            proxy_pass http://ponddb:8432;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }
    }

    # Admin server block — port 8433, Tailscale-only
    server {
        listen 8433;
        server_name _;

        # Allow Tailscale CGNAT range and local networks
        allow 100.64.0.0/10;
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        deny all;

        location / {
            proxy_pass http://ponddb:8432;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
