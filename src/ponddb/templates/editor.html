<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PondDB SQL Editor</title>
  <link rel="stylesheet" href="/static/pond.css?v=3">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>PondDB SQL Editor</h1>
    <button id="sidebar-btn" class="sidebar-toggle">&#9776; Schema</button>
    <input id="query-name" type="text" placeholder="Untitled query" class="query-name-input">
    <label for="session-input" style="font-size:0.85rem;">Session:</label>
    <input id="session-input" type="text" placeholder="paste session_id here" />
  </div>

  <div class="main-layout">
    <!-- Schema sidebar -->
    <aside id="schema-sidebar">
      <div class="sidebar-header">
        <span>Schema Browser</span>
        <button id="schema-refresh-btn" title="Refresh schema" style="cursor:pointer;background:none;border:none;font-size:0.9rem;">&#8635;</button>
      </div>
      <div id="schema-tables">
        <p class="schema-empty">Enter a session ID to browse schema.</p>
      </div>
    </aside>

    <!-- Main editor pane -->
    <div class="editor-pane">
      <div id="editor"></div>
      <div class="action-bar">
        <button id="run-btn" class="btn btn-primary" style="padding:0.4rem 1.2rem;font-size:1rem;">Run</button>
        <button id="save-btn" class="btn btn-secondary"
                hx-post="/queries"
                hx-target="#save-status"
                hx-swap="innerHTML"
                hx-include="#query-name, #session-input"
                hx-vals='js:{"sql": window.__getSQL ? window.__getSQL() : ""}'>
          Save Query
        </button>
        <button id="share-btn" class="btn-outline" style="display:none;"
                hx-target="#share-status"
                hx-swap="innerHTML">
          Share
        </button>
        <span id="save-status" style="font-size:0.8rem;color:var(--pond-text-muted);"></span>
        <span id="share-status" style="font-size:0.8rem;color:var(--pond-text-muted);"></span>
      </div>
      <div id="error-panel" class="error-display"></div>
      <div id="results-container" class="results-area"></div>
      <div id="query-metadata" class="query-metadata" style="display:none;"></div>
      <!-- HTMX-powered async execution -->
      <form id="htmx-exec-form"
            hx-post="/pondapi/execute/htmx"
            hx-target="#pondapi-result"
            hx-swap="outerHTML"
            style="display:none">
        <input type="hidden" id="htmx-session-id" name="session_id" value="">
        <input type="hidden" id="htmx-sql" name="sql" value="">
      </form>
      <div id="pondapi-result">
        <span class="htmx-indicator" style="display:none">Loading...</span>
      </div>
    </div>
  </div>

  <script type="module">
    // -----------------------------------------------------------------------
    // CodeMirror 6 — load from esm.sh
    // -----------------------------------------------------------------------
    let view;
    let getSQL;
    let insertText;

    try {
      const cm = await import("https://esm.sh/@codemirror/basic-setup@0.20.0");
      const { sql } = await import("https://esm.sh/@codemirror/lang-sql@6.8.0");
      const { autocompletion } = await import("https://esm.sh/@codemirror/autocomplete@6.18.6");
      const { EditorView } = await import("https://esm.sh/@codemirror/view@6");

      const state = cm.EditorState.create({
        doc: "SELECT 1;",
        extensions: [cm.basicSetup, sql(), autocompletion()],
      });

      view = new cm.EditorView({
        state,
        parent: document.getElementById("editor"),
      });

      getSQL = () => view.state.doc.toString();
      insertText = (text) => {
        if (!view) return;
        const { from } = view.state.selection.main;
        view.dispatch({
          changes: { from, insert: text },
          selection: { anchor: from + text.length },
        });
        view.focus();
      };
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.id = "sql-textarea";
      ta.rows = 6;
      ta.style.width = "100%";
      ta.value = "SELECT 1;";
      document.getElementById("editor").appendChild(ta);
      getSQL = () => ta.value;
      insertText = (text) => {
        const start = ta.selectionStart;
        ta.value = ta.value.substring(0, start) + text + ta.value.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = start + text.length;
        ta.focus();
      };
    }

    // Expose for HTMX hx-vals
    window.__getSQL = getSQL;

    // -----------------------------------------------------------------------
    // Sidebar toggle
    // -----------------------------------------------------------------------
    document.getElementById("sidebar-btn").addEventListener("click", () => {
      document.getElementById("schema-sidebar").classList.toggle("collapsed");
    });

    // -----------------------------------------------------------------------
    // Schema fetch — type icons for tables and columns
    // -----------------------------------------------------------------------
    const TYPE_ICONS = {
      INTEGER: "\ud83d\udd22", BIGINT: "\ud83d\udd22", SMALLINT: "\ud83d\udd22", TINYINT: "\ud83d\udd22",
      FLOAT: "\ud83d\udd22", DOUBLE: "\ud83d\udd22", DECIMAL: "\ud83d\udd22", NUMERIC: "\ud83d\udd22",
      VARCHAR: "\ud83d\udcdd", TEXT: "\ud83d\udcdd", CHAR: "\ud83d\udcdd", STRING: "\ud83d\udcdd",
      DATE: "\ud83d\udcc5", TIMESTAMP: "\ud83d\udcc5", DATETIME: "\ud83d\udcc5", TIME: "\ud83d\udcc5",
      BOOLEAN: "\u2705", BOOL: "\u2705",
      BLOB: "\ud83d\udce6",
    };
    function typeIcon(colType) {
      const upper = (colType || "").toUpperCase();
      for (const [key, icon] of Object.entries(TYPE_ICONS)) {
        if (upper.includes(key)) return icon;
      }
      return "\u2022";
    }

    async function fetchSchema(sessionId) {
      const container = document.getElementById("schema-tables");
      if (!sessionId) {
        container.innerHTML = '<p class="schema-empty">Enter a session ID to browse schema.</p>';
        return;
      }
      try {
        const resp = await fetch("/schema?session_id=" + encodeURIComponent(sessionId));
        if (!resp.ok) { container.innerHTML = '<p class="schema-empty">Could not load schema.</p>'; return; }
        const tables = await resp.json();
        if (!tables || tables.length === 0) { container.innerHTML = '<p class="schema-empty">No tables found.</p>'; return; }
        let html = "";
        for (const tbl of tables) {
          html += '<div class="schema-table-entry">';
          html += '<div class="schema-table-name" data-table="' + tbl.table_name + '">\ud83d\udccb ' + tbl.table_name + '</div>';
          if (tbl.columns && tbl.columns.length > 0) {
            html += '<ul class="schema-col-list">';
            for (const col of tbl.columns) {
              html += '<li>' + typeIcon(col.type) + ' ' + col.name + '<span class="col-type">' + col.type + '</span></li>';
            }
            html += '</ul>';
          }
          html += '</div>';
        }
        container.innerHTML = html;
        container.querySelectorAll(".schema-table-name").forEach((el) => {
          el.addEventListener("click", () => { if (insertText) insertText(el.dataset.table); });
        });
      } catch (err) { container.innerHTML = '<p class="schema-empty">Error loading schema.</p>'; }
    }

    const sessionInput = document.getElementById("session-input");
    const refreshBtn = document.getElementById("schema-refresh-btn");
    sessionInput.addEventListener("change", () => fetchSchema(sessionInput.value.trim()));
    sessionInput.addEventListener("keydown", (e) => { if (e.key === "Enter") fetchSchema(sessionInput.value.trim()); });
    refreshBtn.addEventListener("click", () => fetchSchema(sessionInput.value.trim()));

    // Read session_id from URL query param (e.g. /editor?session_id=xxx)
    const urlParams = new URLSearchParams(window.location.search);
    const urlSessionId = urlParams.get("session_id");
    if (urlSessionId) {
      sessionInput.value = urlSessionId;
      fetchSchema(urlSessionId);
    } else if (!sessionInput.value.trim()) {
      // Auto-create session only if no session_id was provided
      try {
        const resp = await fetch("/session", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        if (resp.ok) { const data = await resp.json(); sessionInput.value = data.session_id; fetchSchema(data.session_id); }
      } catch (_) {}
    }

    // -----------------------------------------------------------------------
    // Run button — POST /query with pond-table results + metadata
    // -----------------------------------------------------------------------
    const runBtn = document.getElementById("run-btn");
    const errorPanel = document.getElementById("error-panel");
    const resultsContainer = document.getElementById("results-container");
    const metadataEl = document.getElementById("query-metadata");

    runBtn.addEventListener("click", async () => {
      const session_id = sessionInput.value.trim();
      const sqlText = getSQL ? getSQL() : "";
      errorPanel.style.display = "none";
      errorPanel.textContent = "";
      resultsContainer.innerHTML = "";
      metadataEl.style.display = "none";
      const startTime = Date.now();

      try {
        const response = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id, sql: sqlText }),
        });
        const data = await response.json();
        const elapsed = data.elapsed_ms || (Date.now() - startTime);

        if (!response.ok) {
          errorPanel.textContent = data.detail || "Query error";
          errorPanel.style.display = "block";
          return;
        }

        const { columns, rows } = data;
        const rowCount = rows ? rows.length : 0;

        if (!columns || columns.length === 0) {
          resultsContainer.innerHTML = "<p>Query executed. No rows returned.</p>";
          metadataEl.textContent = "Completed in " + elapsed + "ms";
          metadataEl.style.display = "block";
          fetchSchema(session_id);
          return;
        }

        let html = '<span class="result-count">' + rowCount + ' rows returned</span>';
        html += '<table class="pond-table"><thead><tr>';
        for (const col of columns) { html += "<th>" + col + "</th>"; }
        html += "</tr></thead><tbody>";
        for (const row of rows) {
          html += "<tr>";
          for (const cell of row) { html += "<td>" + (cell ?? "") + "</td>"; }
          html += "</tr>";
        }
        html += "</tbody></table>";
        resultsContainer.innerHTML = html;

        metadataEl.textContent = "Completed in " + elapsed + "ms \u00b7 " + rowCount + " rows \u00b7 Cache: " + (data.cache_hit ? "HIT" : "MISS");
        metadataEl.style.display = "block";
        fetchSchema(session_id);
      } catch (err) {
        errorPanel.textContent = err.message || "Network error";
        errorPanel.style.display = "block";
      }
    });
  </script>
</body>
</html>
