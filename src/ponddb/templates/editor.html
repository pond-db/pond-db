<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PondDB SQL Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/pond.css">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    /* Editor page overrides for Pico.css full-width layout */
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>PondDB SQL Editor</h1>
    <button id="sidebar-btn" class="sidebar-toggle">&#9776; Schema</button>
    <label for="session-input">Session ID:</label>
    <input id="session-input" type="text" placeholder="paste session_id here" />
  </div>

  <div class="main-layout">
    <!-- Schema sidebar -->
    <aside id="schema-sidebar">
      <div class="sidebar-header">
        <span>Schema Browser</span>
        <button id="schema-refresh-btn" title="Refresh schema" style="cursor:pointer;background:none;border:none;font-size:0.9rem;">&#8635;</button>
      </div>
      <div id="schema-tables">
        <p class="schema-empty">Enter a session ID to browse schema.</p>
      </div>
    </aside>

    <!-- Main editor pane -->
    <div class="editor-pane">
      <div id="editor"></div>
      <div class="toolbar">
        <button id="run-btn" class="run-button">Run</button>
      </div>
      <div id="error-panel" class="error-display"></div>
      <div id="results-container" class="results-area"></div>
      <!-- HTMX-powered async execution -->
      <form id="htmx-exec-form"
            hx-post="/pondapi/execute/htmx"
            hx-target="#pondapi-result"
            hx-swap="outerHTML"
            style="display:none">
        <input type="hidden" id="htmx-session-id" name="session_id" value="">
        <input type="hidden" id="htmx-sql" name="sql" value="">
      </form>
      <div id="pondapi-result">
        <span class="htmx-indicator" style="display:none">Loading...</span>
      </div>
    </div>
  </div>

  <script type="module">
    // ---------------------------------------------------------------------------
    // CodeMirror 6 — load from esm.sh
    // ---------------------------------------------------------------------------
    let view;
    let getSQL;
    let insertText;

    try {
      const cm = await import("https://esm.sh/@codemirror/basic-setup@0.20.0");
      const { sql } = await import("https://esm.sh/@codemirror/lang-sql@6.8.0");
      const { autocompletion } = await import("https://esm.sh/@codemirror/autocomplete@6.18.6");
      const { EditorView } = await import("https://esm.sh/@codemirror/view@6");

      const state = cm.EditorState.create({
        doc: "SELECT 1;",
        extensions: [cm.basicSetup, sql(), autocompletion()],
      });

      view = new cm.EditorView({
        state,
        parent: document.getElementById("editor"),
      });

      getSQL = () => view.state.doc.toString();

      // Insert table_name at cursor position
      insertText = (text) => {
        if (!view) return;
        const { from } = view.state.selection.main;
        view.dispatch({
          changes: { from, insert: text },
          selection: { anchor: from + text.length },
        });
        view.focus();
      };
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.id = "sql-textarea";
      ta.rows = 6;
      ta.style.width = "100%";
      ta.value = "SELECT 1;";
      document.getElementById("editor").appendChild(ta);
      getSQL = () => ta.value;
      insertText = (text) => {
        const start = ta.selectionStart;
        const before = ta.value.substring(0, start);
        const after = ta.value.substring(ta.selectionEnd);
        ta.value = before + text + after;
        ta.selectionStart = ta.selectionEnd = start + text.length;
        ta.focus();
      };
    }

    // ---------------------------------------------------------------------------
    // Sidebar toggle
    // ---------------------------------------------------------------------------
    const sidebar = document.getElementById("schema-sidebar");
    const sidebarBtn = document.getElementById("sidebar-btn");

    sidebarBtn.addEventListener("click", () => {
      sidebar.classList.toggle("collapsed");
    });

    // ---------------------------------------------------------------------------
    // Schema fetch — GET /schema?session_id=...
    // ---------------------------------------------------------------------------
    async function fetchSchema(sessionId) {
      const container = document.getElementById("schema-tables");
      if (!sessionId) {
        container.innerHTML = '<p class="schema-empty">Enter a session ID to browse schema.</p>';
        return;
      }
      try {
        const resp = await fetch(`/schema?session_id=${encodeURIComponent(sessionId)}`);
        if (!resp.ok) {
          container.innerHTML = '<p class="schema-empty">Could not load schema.</p>';
          return;
        }
        const tables = await resp.json();
        if (!tables || tables.length === 0) {
          container.innerHTML = '<p class="schema-empty">No tables found.</p>';
          return;
        }
        let html = "";
        for (const tbl of tables) {
          const table_name = tbl.table_name;
          html += `<div class="schema-table-entry">`;
          html += `<div class="schema-table-name" data-table="${table_name}">${table_name}</div>`;
          if (tbl.columns && tbl.columns.length > 0) {
            html += `<ul class="schema-col-list">`;
            for (const col of tbl.columns) {
              html += `<li>${col.name}<span class="col-type">${col.type}</span></li>`;
            }
            html += `</ul>`;
          }
          html += `</div>`;
        }
        container.innerHTML = html;

        // Attach click handlers — insert table_name at cursor
        container.querySelectorAll(".schema-table-name").forEach((el) => {
          el.addEventListener("click", () => {
            const tableName = el.dataset.table;
            if (insertText) insertText(tableName);
          });
        });
      } catch (err) {
        container.innerHTML = '<p class="schema-empty">Error loading schema.</p>';
      }
    }

    // Refresh schema when session ID changes (on blur/enter) or button clicked
    const sessionInput = document.getElementById("session-input");
    const refreshBtn = document.getElementById("schema-refresh-btn");

    sessionInput.addEventListener("change", () => fetchSchema(sessionInput.value.trim()));
    sessionInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") fetchSchema(sessionInput.value.trim());
    });
    refreshBtn.addEventListener("click", () => fetchSchema(sessionInput.value.trim()));

    // Auto-create a session on page load so users don't have to paste one
    if (!sessionInput.value.trim()) {
      try {
        const resp = await fetch("/session", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        if (resp.ok) {
          const data = await resp.json();
          sessionInput.value = data.session_id;
          fetchSchema(data.session_id);
        }
      } catch (_) { /* user can still paste manually */ }
    }

    // ---------------------------------------------------------------------------
    // Run button — POST /query
    // ---------------------------------------------------------------------------
    const runBtn = document.getElementById("run-btn");
    const errorPanel = document.getElementById("error-panel");
    const resultsContainer = document.getElementById("results-container");

    runBtn.addEventListener("click", async () => {
      const session_id = sessionInput.value.trim();
      const sql = getSQL ? getSQL() : "";

      errorPanel.style.display = "none";
      errorPanel.textContent = "";
      resultsContainer.innerHTML = "";

      try {
        const response = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id, sql }),
        });

        const data = await response.json();

        if (!response.ok) {
          errorPanel.textContent = data.detail || "Query error";
          errorPanel.style.display = "block";
          return;
        }

        const { columns, rows } = data;
        if (!columns || columns.length === 0) {
          resultsContainer.innerHTML = "<p>Query executed. No rows returned.</p>";
          // Refresh schema after DDL
          fetchSchema(session_id);
          return;
        }

        let html = "<table><thead><tr>";
        for (const col of columns) {
          html += `<th>${col}</th>`;
        }
        html += "</tr></thead><tbody>";
        for (const row of rows) {
          html += "<tr>";
          for (const cell of row) {
            html += `<td>${cell ?? ""}</td>`;
          }
          html += "</tr>";
        }
        html += "</tbody></table>";
        resultsContainer.innerHTML = html;
        // Refresh schema in case query created/dropped tables
        fetchSchema(session_id);
      } catch (err) {
        errorPanel.textContent = err.message || "Network error";
        errorPanel.style.display = "block";
      }
    });
  </script>
</body>
</html>
