{% extends "base.html" %}
{% block title %}Edit Quota — PondDB Admin{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="/dashboard">Dashboard</a> &rsaquo; <a href="/admin">Admin</a> &rsaquo;
  <a href="/admin/namespaces">Namespaces</a> &rsaquo; Edit Quota
</div>

<h2>Edit Workgroup Quota</h2>

<div style="background:var(--pond-bg);border-radius:6px;padding:0.75rem 1rem;margin-bottom:1.25rem;font-size:0.875rem;color:var(--pond-text-muted);">
  <strong>Workgroup:</strong> {{ workgroup.name }}
  &nbsp;|&nbsp; <strong>ID:</strong> {{ wg_id }}
</div>

{% if error %}
<div class="error-msg">{{ error }}</div>
{% endif %}

<article>
  <form action="/admin/workgroups/{{ wg_id }}/quota" method="POST">
    <label for="max_sessions">
      max_sessions (Max concurrent sessions)
      <input
        type="number"
        id="max_sessions"
        name="max_sessions"
        min="1"
        value="{{ workgroup.quota.max_sessions if workgroup.quota and workgroup.quota.max_sessions is not none else '' }}"
        placeholder="Leave blank for unlimited"
      >
      <small>Maximum number of active sessions allowed in this workgroup. Must be &gt; 0.</small>
    </label>

    <label for="max_query_duration_ms">
      max_query_duration_ms (Query timeout in ms)
      <input
        type="number"
        id="max_query_duration_ms"
        name="max_query_duration_ms"
        min="0"
        value="{{ workgroup.quota.max_query_duration_ms if workgroup.quota and workgroup.quota.max_query_duration_ms is not none else '' }}"
        placeholder="Leave blank for unlimited"
      >
      <small>Maximum query duration in milliseconds. Leave blank for no limit.</small>
    </label>

    <label for="max_result_mb">
      max_result_mb (Max result size in MB)
      <input
        type="number"
        id="max_result_mb"
        name="max_result_mb"
        min="0"
        value="{{ workgroup.quota.max_result_mb if workgroup.quota and workgroup.quota.max_result_mb is not none else '' }}"
        placeholder="Leave blank for unlimited"
      >
      <small>Maximum query result size in megabytes. Leave blank for no limit.</small>
    </label>

    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button type="submit">Save Quota</button>
      <a href="/admin/namespaces" role="button" class="secondary">Cancel</a>
    </div>
  </form>
</article>
{% endblock %}
